services:
  postgres:
    image: postgres:16-alpine
    container_name: urbanbike-postgres
    environment:
      POSTGRES_DB: urbanbike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - urbanbike_data:/var/lib/postgresql/data

volumes:
  urbanbike_data:
